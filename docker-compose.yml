services:
  db:
    image: postgres:16-alpine
    container_name: jobinsight_db
    restart: always
    environment:
      POSTGRES_USER: jobinsight_user
      POSTGRES_PASSWORD: jobinsight_password
      POSTGRES_DB: jobinsight_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobinsight_user -d jobinsight_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jobinsight_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:6333/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobinsight_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobinsight_backend
    restart: always
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Celery Worker — Exécute les tâches asynchrones (NLP, embeddings, scraping)
  # -----------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobinsight_worker
    restart: always
    command: celery -A app.worker:celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/code
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Celery Beat — Planificateur CRON pour le scraping automatique
  # Analogie : C'est le réveil qui sonne toutes les X heures pour dire
  # au worker "Hey, c'est l'heure de scraper LinkedIn !"
  # -----------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobinsight_beat
    restart: always
    command: celery -A app.worker:celery_app beat --loglevel=info
    volumes:
      - ./backend:/code
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobinsight_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
  qdrant_storage:

server {
    listen 80;
    server_name ton-domaine.com; # À remplacer par ton domaine ou IP

    # Nécessaire pour Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirection HTTP vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ton-domaine.com;

    # SSL (Ces fichiers seront créés par Certbot)
    # ssl_certificate /etc/letsencrypt/live/ton-domaine.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ton-domaine.com/privkey.pem;

    # Proxy vers le Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy vers le Backend (FastAPI)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Documentation API
    location /docs {
        proxy_pass http://backend:8000/docs;
    }
}

services:

  db:
    image: postgres:16-alpine
    container_name: jobinsight_db_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - jobinsight_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobinsight_redis_prod
    restart: unless-stopped
    networks:
      - jobinsight_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: jobinsight_qdrant_prod
    restart: unless-stopped
    volumes:
      - qdrant_storage_prod:/qdrant/storage
    networks:
      - jobinsight_net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:6333/health" ]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jobinsight-backend:latest
    container_name: jobinsight_backend_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    command: >
      gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - jobinsight_net

  celery_worker:
    image: jobinsight-backend:latest
    container_name: jobinsight_worker_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    command: >
      celery -A app.tasks.worker:celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - jobinsight_net

  celery_beat:
    image: jobinsight-backend:latest
    container_name: jobinsight_beat_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    command: >
      celery -A app.tasks.worker:celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jobinsight_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: jobinsight_frontend_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - backend
    networks:
      - jobinsight_net

  nginx:
    image: nginx:stable-alpine
    container_name: jobinsight_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - jobinsight_net

networks:
  jobinsight_net:
    driver: bridge

volumes:
  pgdata_prod:
  qdrant_storage_prod:
